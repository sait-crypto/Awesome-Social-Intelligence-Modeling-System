# -*- coding: utf-8 -*-
# 项目核心配置文件 - config.ini
# 配置项修改后重启项目生效
# 注释说明：使用 # 或 // 或 ; 作为注释符
# 配置规范：键值对格式 key = value，布尔值使用 true/false，字符串/数字无需加引号，部分列表配置项使用 , 分割多个值
# 路径说明：支持相对路径

[paths]
# 核心数据库
database =paper_database.csv
# Complete List 使用独立数据库；该数据库只由 README 生成器读取，不参与 AI 字段生成
complete_list_database = paper_database_complete_list.csv
complete_list_output = COMPLETE_LIST.md
paper_metadata = config/paper_metadata.json
# 更新文件路径
update_csv = submit_template.csv
update_json = submit_template.json
my_update_csv = my_submit.csv
my_update_json = my_submit.json
# 额外的更新文件路径列表
extra_update_file=  #使用,分割
# 文件备份位置
backup_dir = backups/
# 引用图片位置
figure_dir = figures/
# papers文件位置
paper_dir = papers/
#引用资源根目录 (新逻辑：assets/{uid}/)
assets_dir = assets/

[ai]
# 全局 Key 文件路径 (一行一个 Key，或 JSON 格式，这里简化为单行/多行文本，顺序匹配)
key_path =\Keys\ai_api_key.txt
enable_ai_generation = true
update_generation_scope = all  # Automatic update pipeline: all | analogy_only
# 默认配置，具体Key在GUI中配置或覆盖
ai_generate_mark = [AI generated]
# 默认使用的配置名
active_profile = default_deepseek


[format]
# 数据库/CSV格式配置 (GUI显示用)
header_fill_color = BDD7EE
required_header_color = 366092
conflict_fill_color = FFCCCC
header_font_color = FFFFFF
invalid_fill_color = FF0000

[database]
administer_password_path = \Keys\administer_password.txt
# 论文贡献者字段默认值
default_contributor = anonymous
# 冲突条目标注符
conflict_marker = [💥冲突]
# 中文翻译分隔符（之前是英文，之后是中文翻译），如果自己构建中英双语内容，也推荐使用
translation_separator=[翻译]
# 字段值废弃符（存在该符的值被视作废弃）（目前逻辑不全面，仅允许ai生成覆盖）
value_deprecation_mark=[Deprecated]
# 冲突处理策略
conflict_resolution = mark # mark：写入并标注冲突、replace：始终由最新者替换、skip：跳过冲突者
# 完全无误正常添加的论文是否从相应更新文件中移除，如果开启，发生移除前会进行备份
remove_added_paper_in_template = false  #true or false
# 一篇论文允许的最大分类数量
max_categories_per_paper = 4
# 一篇论文允许的最大 pipeline 图片数量
max_pipeline_images_per_paper = 4

[zotero]
import_notes_from_meta = true  # Import Zotero meta "note" content into Paper.notes
# 可选：手动指定 zotero.sqlite 路径。
# 系统会按“默认地址 + 该地址”两处尝试。
database_path =

[readme]
# 生成readme时，截断中文翻译（从中文翻译分隔符开始截断）
truncate_translation=false
# readme长度限制
max_title_length = 100
max_authors_length = 150
# Long README fields are truncated independently by character count; 0 disables truncation.
max_analogy_summary_length = 240
max_summary_motivation_length = 240
max_summary_innovation_length = 240
max_summary_method_length = 240
max_summary_conclusion_length = 240
max_summary_limitation_length = 240
max_notes_length = 400
# 相关逻辑未实现，该参数目前未采用
date_format = YYYY-MM-DD
# 字段值应用并显示markdown格式，如果启用可能会导致部分符号未被正确转义，需要注意
enable_markdown=true

[ui]
# 是否在界面中显示并启用自动提交PR按钮（true/false）
enable_pr = true
# 保存到文件时是否允许验证不通过，strict或lenient
save_validation_strategy = strict
# 保存模式：incremental（增量）或 rewrite（重写）
save_mode = incremental

